name: CI

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable)
        run: pip install -e .
      - name: Smoke tests
        run: python tests/test_smoke.py

  # Single stable status check to require in branch protection — green only if
  # every matrix `test` job above passed.
  ci:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "all tests passed"
